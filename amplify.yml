# Publishes only landing/ as the site. REPO root via git (CODEBUILD_SRC_DIR may be parent of clone folder).
version: 1
frontend:
  phases:
    build:
      commands:
        - |
          set -e
          cd "${CODEBUILD_SRC_DIR:-.}"
          REPO="$(git rev-parse --show-toplevel 2>/dev/null || echo "$PWD")"
          OUT="$REPO/.amplify-hosting"
          python3 "$REPO/landing/inject_api_base.py"
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cp -a "$REPO/landing/." "$OUT/"
          rm -f "$OUT/inject_api_base.py"
          echo "Static landing staged to .amplify-hosting"
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
