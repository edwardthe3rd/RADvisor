# Ship only landing/. Finds project dir when CODEBUILD_SRC_DIR is parent of the app folder.
version: 1
frontend:
  phases:
    build:
      commands:
        - |
          set -e
          shopt -s nullglob
          cd "${CODEBUILD_SRC_DIR:-.}"
          STAGE="$PWD/.amplify-hosting"
          REPO="$PWD"
          if [ ! -f "$REPO/landing/index.html" ]; then
            for d in "$REPO"/*/; do
              [ -f "${d}landing/index.html" ] || continue
              REPO="$(cd "${d%/}" && pwd)"
              break
            done
          fi
          if [ ! -f "$REPO/landing/index.html" ]; then
            echo "Could not find landing/index.html under ${CODEBUILD_SRC_DIR:-.}" >&2
            ls -la
            exit 1
          fi
          if [ -n "${WAITLIST_API_BASE:-}" ]; then
            export RADV_INJECT_BASE="$WAITLIST_API_BASE"
            export RADV_INJECT_HTML="$REPO/landing/index.html"
            python3 "$REPO/landing/_amplify_waitlist_inject.py"
          fi
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -a "$REPO/landing/." "$STAGE/"
          rm -f "$STAGE/_amplify_waitlist_inject.py"
          echo "Static landing staged at .amplify-hosting"
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - "**/*"
