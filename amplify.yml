version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd "$CODEBUILD_SRC_DIR/mobile" && npm ci
    build:
      commands:
        - cd "$CODEBUILD_SRC_DIR/mobile" && npx expo export -p web
  artifacts:
    baseDirectory: mobile/dist
    files:
      - "**/*"
  cache:
    paths:
      - mobile/node_modules/**/*
