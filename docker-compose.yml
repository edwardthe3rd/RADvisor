version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: radvisor
      POSTGRES_USER: radvisor
      POSTGRES_PASSWORD: radvisor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_dev_data &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-prod
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,192.168.1.160
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=radvisor
      - DB_USER=radvisor
      - DB_PASSWORD=radvisor
      - DB_HOST=db
      - DB_PORT=5432

volumes:
  pgdata:
  backend_media:
